<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balatro – Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <input type="checkbox" id="lang-toggle">

  <div class="site-shell">

    <nav>
      <a href="index.html">
        <span class="lang-en-inline">Home</span>
        <span class="lang-fr-inline">Accueil</span>
      </a>
      <a href="rules.html">
        <span class="lang-en-inline">Rules</span>
        <span class="lang-fr-inline">Règles</span>
      </a>
      <a href="modding.html">Modding</a>
      <a href="bmp.html">BMP</a>
      <a href="contact.html" class="active">Contact</a>
      <div class="lang-btn-wrap">
        <div class="lang-btn">
          <label class="lbl-en" for="lang-toggle">EN</label>
          <label class="lbl-fr" for="lang-toggle">FR</label>
        </div>
      </div>
    </nav>

    <!-- PARALLAX HERO -->
    <div class="parallax-hero"></div>

    <main class="page">

      <!-- ═══ EN ═══ -->
      <div class="lang-en">
        <h1 class="contact-title">Contact Us</h1>
        <p class="contact-sub">
          A question, a suggestion or a bug to report? Write to us —<br>
          we'll be happy to hear from you.
        </p>
        <div class="contact-form">
          <div class="form-field">
            <label for="pseudo-en">Username</label>
            <input type="text" id="pseudo-en" name="pseudo" placeholder="YourFavouriteJoker">
          </div>
          <div class="form-field">
            <label for="email-en">Email address</label>
            <input type="email" id="email-en" name="email" placeholder="joker@balatro.com">
          </div>
          <div class="form-field">
            <label for="address-en">Address</label>
            <input type="text" id="address-en" name="address" placeholder="12 Joker Street, London">
          </div>
          <div class="form-field">
            <label for="msg-en">Message</label>
            <textarea id="msg-en" name="message" placeholder="Your message here…"></textarea>
          </div>
          <button type="submit">Send ♠</button>
        </div>
      </div>

      <!-- ═══ FR ═══ -->
      <div class="lang-fr">
        <h1 class="contact-title">Contactez-nous</h1>
        <p class="contact-sub">
          Une question, une suggestion ou un bug à signaler ? Écrivez-nous —<br>
          nous serons ravis de vous lire.
        </p>
        <div class="contact-form">
          <div class="form-field">
            <label for="pseudo-fr">Pseudonyme</label>
            <input type="text" id="pseudo-fr" name="pseudo" placeholder="VotreJokerPréféré">
          </div>
          <div class="form-field">
            <label for="email-fr">Adresse e-mail</label>
            <input type="email" id="email-fr" name="email" placeholder="joker@balatro.com">
          </div>
          <div class="form-field">
            <label for="address-fr">Adresse</label>
            <input type="text" id="address-fr" name="address" placeholder="12 rue des Jokers, Paris">
          </div>
          <div class="form-field">
            <label for="msg-fr">Message</label>
            <textarea id="msg-fr" name="message" placeholder="Votre message ici…"></textarea>
          </div>
          <button type="submit">Envoyer ♠</button>
        </div>
      </div>

    </main>

    <footer>Balatro Project</footer>

  </div>

</body>
</html>
